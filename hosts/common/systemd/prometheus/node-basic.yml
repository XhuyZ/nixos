groups:
  - name: node-basic
    rules:
      # =========================
      # CPU usage (%)
      # =========================
      - record: node:cpu_usage:percent
        expr: |
          100 * (1 - avg by (instance) (
            rate(node_cpu_seconds_total{mode="idle"}[1m])
          ))

      # =========================
      # Memory usage (%)
      # =========================
      - record: node:memory_usage:percent
        expr: |
          100 * (
            1 - (
              node_memory_MemAvailable_bytes
              /
              node_memory_MemTotal_bytes
            )
          )

      # =========================
      # Disk usage (% per mountpoint)
      # =========================
      - record: node:disk_usage:percent
        expr: |
          100 * (
            1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
              /
              node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}
            )
          )

      # =========================
      # Disk IO (read/write bytes per second)
      # =========================
      - record: node:disk_read_bytes:rate
        expr: rate(node_disk_read_bytes_total[1m])

      - record: node:disk_write_bytes:rate
        expr: rate(node_disk_written_bytes_total[1m])

      # =========================
      # Disk IO operations (IOPS)
      # =========================
      - record: node:disk_read_iops:rate
        expr: rate(node_disk_reads_completed_total[1m])

      - record: node:disk_write_iops:rate
        expr: rate(node_disk_writes_completed_total[1m])

      # =========================
      # Disk IO time (% utilization)
      # =========================
      - record: node:disk_io_util:percent
        expr: |
          100 * rate(node_disk_io_time_seconds_total[1m])

      # =========================
      # Disk latency (approx)
      # =========================
      - record: node:disk_read_latency:seconds
        expr: |
          rate(node_disk_read_time_seconds_total[1m])
          /
          rate(node_disk_reads_completed_total[1m])

      - record: node:disk_write_latency:seconds
        expr: |
          rate(node_disk_write_time_seconds_total[1m])
          /
          rate(node_disk_writes_completed_total[1m])

      # =========================
      # Network throughput
      # =========================
      - record: node:network_receive_bytes:rate
        expr: rate(node_network_receive_bytes_total[1m])

      - record: node:network_transmit_bytes:rate
        expr: rate(node_network_transmit_bytes_total[1m])
